<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>The Magic Oracle</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital@0;1&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0f0f1a 50%, #050508 100%);
            font-family: 'Playfair Display', serif;
            overflow: hidden;
            position: relative;
        }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
        }
        
        h1 {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            letter-spacing: 0.3em;
        }
        
        .orb-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 2rem;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .orb-container:hover {
            transform: scale(1.05);
        }
        
        .orb {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, 
                rgba(100, 200, 255, 0.4) 0%, 
                rgba(50, 100, 200, 0.2) 40%, 
                rgba(20, 50, 100, 0.6) 70%,
                rgba(10, 20, 50, 0.9) 100%);
            box-shadow: 
                0 0 60px rgba(100, 180, 255, 0.3),
                0 0 100px rgba(100, 180, 255, 0.1),
                inset 0 0 60px rgba(100, 180, 255, 0.2),
                inset -20px -20px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .orb::before {
            content: '';
            position: absolute;
            top: 10%;
            left: 15%;
            width: 30%;
            height: 20%;
            background: radial-gradient(ellipse, rgba(255,255,255,0.4) 0%, transparent 70%);
            border-radius: 50%;
            transform: rotate(-30deg);
        }
        
        .orb-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100, 180, 255, 0.1) 0%, transparent 70%);
            animation: pulse 3s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }
        
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(212, 175, 55, 0.8);
            border-radius: 50%;
            animation: particle-float 4s ease-in-out infinite;
        }
        
        @keyframes particle-float {
            0%, 100% { 
                transform: translateY(0) scale(1); 
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { 
                transform: translateY(-200px) scale(0); 
                opacity: 0;
            }
        }
        
        .answer-container {
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
        }
        
        .answer {
            font-size: 1.4rem;
            color: #e8e8e8;
            font-style: italic;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            max-width: 400px;
            line-height: 1.6;
        }
        
        .answer.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .instruction {
            color: #888;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            animation: breathe 2s ease-in-out infinite;
        }
        
        @keyframes breathe {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .sparkle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #fff 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle 1s ease-out forwards;
        }
        
        @keyframes sparkle {
            0% { transform: scale(0); opacity: 1; }
            50% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

        const secondParts = [

            "your light is attracting exactly what you need.",
            "the cosmos is aligning for your success.",

        // Random number generator with seed for reproducibility
        function seededRandom(seed) {
            const x = Math.sin(seed++) * 10000;
            return x - Math.floor(x);
        }
        
        let seed = Date.now();
        
        function randomElement(arr) {
            seed++;
            return arr[Math.floor(seededRandom(seed) * arr.length)];
        }
        
        // Generate a unique fortune message with extreme variety
        function generateFortune() {
            const template = Math.floor(seededRandom(seed++) * 10);
            
            switch(template) {
                case 0:
                    return `${randomElement(timeframes)}, ${randomElement(subjects).toLowerCase()} ${randomElement(actions)}. ${randomElement(moods)}`;
                case 1:
                    return `The ${randomElement(emotionalStates)} you seek is ${randomElement(timeframes).toLowerCase()} ${randomElement(actions)}. ${randomElement(moods)}`;
                case 2:
                    return `${randomElement(subjects)} ${randomElement(actions).replace('is', 'will be')}, and ${randomElement(outcomes)}`;
                case 3:
                    return `In ${randomElement(timeframes).toLowerCase()}, ${randomElement(outcomes).replace('.', '')} Your journey is guiding you toward something magnificent.`;
                case 4:
                    return `${randomElement(subjects)} ${randomElement(actions)} ${randomElement(modifiers)}. ${randomElement(moods)}`;
                case 5:
                    return `${randomElement(connectors)}, ${randomElement(secondParts)} ${randomElement(timeframes)}, ${randomElement(outcomes)}`;
                case 6:
                    return `When ${randomElement(timeframes).toLowerCase()} brings you ${randomElement(subjects).toLowerCase()}, know that ${randomElement(outcomes).toLowerCase()} ${randomElement(moods)}`;

                    return `The cosmos has heard your whispers. ${randomElement(timeframes)}, ${randomElement(subjects).toLowerCase()} ${randomElement(actions)} ${randomElement(modifiers)}.`;

                    return `Your ${randomElement(emotionalStates)} energy is attracting ${randomElement(subjects).toLowerCase()} ${randomElement(actions)}. ${randomElement(moods)}`;

                    return `${randomElement(timeframes)} marks the beginning of ${randomElement(outcomes).toLowerCase()} ${randomElement(moods)} And ${randomElement(subjects).toLowerCase()} ${randomElement(actions)}.`;

                    return `${randomElement(subjects)} ${randomElement(actions)}. ${randomElement(outcomes)} Trust that the universe is conspiring in your favor.`;
            }
        }
        
        const starsContainer = document.getElementById('stars');
        const particlesContainer = document.getElementById('particles');
        const orbContainer = document.getElementById('orbContainer');
        const answerEl = document.getElementById('answer');
        
        // Create stars
        for (let i = 0; i < 100; i++) {

        // Create sparkle effect

            sparkle.style.top = y + 'px';

            for (let i = 0; i < 10; i++) {

            }, 400);
